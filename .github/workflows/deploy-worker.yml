name: Deploy Worker IA

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: worker/
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kodan-helper-worker:latest
            ghcr.io/${{ github.repository_owner }}/kodan-helper-worker:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            REPO_DIR="/opt/kodanapps/kodan-helper"
            if [ ! -d "$REPO_DIR/.git" ]; then
              rm -rf "$REPO_DIR"
              git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/gerlandog-sudo/kodanHELPER.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git pull
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
            echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "CORS_ORIGIN=https://helper.kodan.software" >> .env
            docker compose -f docker-compose.prod.yml pull helper-worker
            docker compose -f docker-compose.prod.yml up -d --remove-orphans helper-worker
            docker image prune -f
