server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/manifest+json;

    # Map .webmanifest extension to correct MIME type
    types {
        application/manifest+json webmanifest;
    }

    # Service worker - MUST NOT be cached
    location /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        expires off;
        try_files $uri =404;
    }

    # App assets - cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA icons
    location /icons/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes -> index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
