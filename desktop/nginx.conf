server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Mobile detection: redirect to mhelper.kodan.software
    set $mobile_redirect "";
    if ($http_user_agent ~* "(android|iphone|ipad|ipod|blackberry|iemobile|opera mini|palmos|webos|bada|symbian)") {
        set $mobile_redirect "1";
    }
    if ($http_user_agent ~* "mobile|tablet") {
        set $mobile_redirect "1";
    }
    if ($mobile_redirect = "1") {
        return 301 https://mhelper.kodan.software$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

